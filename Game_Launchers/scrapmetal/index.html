<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="../../favicon.png">
  <title>Crafted Gamz</title>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; overflow-x: hidden; }
    iframe.bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; border: none; }
    nav { position: fixed; top: 0; left: 0; width: 100%; background: rgba(0, 0, 0, 0.8); padding: 20px; text-align: center; z-index: 2; }
    nav a { color: white; text-decoration: none; margin: 0 20px; font-weight: bold; font-size: 16px; transition: color 0.2s; }
    nav a:hover { color: #96f3f5; }
    .game-container { margin-top: 100px; display: flex; flex-direction: column; align-items: center; z-index: 1; position: relative; }
    .game-window { width: 90vw; height: 75vh; border: 3px solid #444; box-shadow: 0 0 20px #0ff5; border-radius: 12px; overflow: hidden; }
    .game-window iframe { width: 100%; height: 100%; border: none; }
    .controls { margin-top: 15px; display: flex; gap: 15px; flex-wrap: wrap; justify-content: flex-start; background: rgba(0, 0, 0, 0.85); padding: 12px 20px; border-radius: 10px; box-shadow: 0 0 10px #0ff5; position: relative; }
    .controls button { background: #222; border: 1px solid #0ff; color: #0ff; padding: 10px 16px; font-weight: bold; cursor: pointer; border-radius: 6px; transition: 0.2s; }
    .controls button:hover { background: #0ff; color: #000; }
    .game-title { color: white; font-size: 16px; font-weight: bold; text-align: left; margin-right: auto; text-shadow: 0 0 5px #000; }
  </style>
</head>
<body>

  <iframe class="bg" src="../../bg.html"></iframe>

  <nav>
    <a href="../../main.html">Home</a>
    <a href="../../search.html">Search</a>
    <a href="../../games.html">Games</a>
    <a href="../../apps.html">Apps</a>
    <a href="../../tools.html">Tools</a>
    <a href="../../settings.html">Settings</a>
  </nav>

  <div class="game-container">
    <div class="game-window">
      <iframe id="gameFrame" src="../../3kh0_Games/scrapmetal/index.html"></iframe>
    </div>
    <div class="controls">
      <div class="game-title">Crafted Gamz | scrapmetal</div>
      <button onclick="goBack()">Back To All Games</button>
      <button onclick="reloadGame()">Reload Frame</button>
      <button onclick="fullscreenGame()">Fullscreen</button>
      <button onclick="copyURL()">Get Direct Game URL</button>
      <div class="game-title">scrapmetal | Crafted Gamz</div>
    </div>
  </div>

  <script>
    function goBack() { window.location.href = '../../games.html'; }
    function reloadGame() { const frame = document.getElementById('gameFrame'); frame.src = frame.src; }
    function fullscreenGame() {
      const elem = document.querySelector('.game-window');
      if (elem.requestFullscreen) { elem.requestFullscreen(); }
      else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); }
      else if (elem.msRequestFullscreen) { elem.msRequestFullscreen(); }
    }
    function copyURL() {
      const frameSrc = document.getElementById('gameFrame').src;
      const match = frameSrc.match(/3kh0_Games\/([^/]+)/);
      const folder = match ? match[1] : 'default';
      const fullURL = `https://www.cgamz.site/3kh0_Games/${folder}/index.html`;
      navigator.clipboard.writeText(fullURL).then(() => { alert("Direct game URL copied!"); });
    }
  </script>
</body>
</html>

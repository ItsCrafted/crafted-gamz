<html>
    <body>
        <!-- Register form -->
<form id="registerForm">
  <input type="email" id="email" placeholder="Email" required />
  <input type="password" id="password" placeholder="Password" required />
  <input type="text" id="displayName" placeholder="Display Name" required />
  <input type="number" id="age" placeholder="Age" required min="1" />
  <button type="submit">Register</button>
</form>

<!-- Login form -->
<form id="loginForm" style="display:none;">
  <input type="email" id="loginEmail" placeholder="Email" required />
  <input type="password" id="loginPassword" placeholder="Password" required />
  <button type="submit">Login</button>
</form>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js";

  const firebaseConfig = {
    // your config here
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  const registerForm = document.getElementById('registerForm');
  const loginForm = document.getElementById('loginForm');

  registerForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = e.target.email.value;
    const password = e.target.password.value;
    const displayName = e.target.displayName.value;
    const age = parseInt(e.target.age.value);

    try {
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;

      await setDoc(doc(db, "users", user.uid), {
        displayName,
        age,
        email
      });

      alert('Registered! You can now log in.');
      registerForm.style.display = 'none';
      loginForm.style.display = 'block';

    } catch (error) {
      alert('Error: ' + error.message);
    }
  });

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = e.target.loginEmail.value;
    const password = e.target.loginPassword.value;

    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch (error) {
      alert('Login error: ' + error.message);
    }
  });

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      const userDoc = await getDoc(doc(db, "users", user.uid));
      if (userDoc.exists()) {
        const userData = userDoc.data();
        console.log("Logged in as:", userData.displayName, "Age:", userData.age);
        // Hide login/register, show chat UI here
      }
    } else {
      // Not logged in, show login/register UI
      registerForm.style.display = 'block';
      loginForm.style.display = 'none';
    }
  });
</script>

    </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crafted Gamz</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(145deg, #121212, #1e1e1e);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .container {
      background-color: #1a1a1a;
      border: 2px solid #96f3f5;
      border-radius: 16px;
      max-width: 600px;
      width: 100%;
      padding: 30px;
      box-shadow: 0 0 25px rgba(150, 243, 245, 0.2);
      text-align: center;
    }

    .container h1 {
      color: #96f3f5;
      font-size: 2.2rem;
      margin-bottom: 20px;
    }

    .container p {
      font-size: 1.1rem;
      line-height: 1.6;
      color: #e0e0e0;
    }

    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }

      .container h1 {
        font-size: 1.7rem;
      }

      .container p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>False Hope | My Story</h1>
    <p>
        
    </p>
  </div>
</body>
</html>

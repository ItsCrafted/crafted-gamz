<!DOCTYPE html>
<html>
<head>
  <title>Launch Hyperbeam</title>
  <style>
    body {
      background: #000;
      color: white;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      background-color: #96f3f5;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 20px;
    }

    iframe {
      width: 90%;
      height: 80vh;
      border: none;
      display: none;
    }
  </style>
</head>
<body>
  <button onclick="launchVM()">Launch VM</button>
  <iframe id="vmFrame"></iframe>

  <script>
    async function launchVM() {
      const btn = document.querySelector("button");
      btn.disabled = true;
      btn.innerText = "Launching...";

      try {
        const res = await fetch("https://YOUR_REPLIT_PROJECT_NAME.YOUR_USERNAME.repl.co/launch");
        const data = await res.json();
        if (data.url) {
          const frame = document.getElementById("vmFrame");
          frame.src = data.url;
          frame.style.display = "block";
          btn.style.display = "none";
        } else {
          btn.innerText = "Failed to launch VM";
        }
      } catch (err) {
        console.error(err);
        btn.innerText = "Error launching VM";
      }
    }
  </script>
</body>
</html>
